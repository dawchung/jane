<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>精神科購物管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="background-shape background-shape-left"></div>
  <div class="background-shape background-shape-right"></div>

  <main class="app-shell">
    <section id="sync-banner" class="sync-banner">
      <div>
        <strong id="sync-title">同步模式：本機</strong>
        <p id="sync-message">目前資料只存在本機瀏覽器。</p>
      </div>
      <button type="button" id="sync-refresh" class="secondary-button">重新整理雲端資料</button>
    </section>

    <section class="hero-card">
      <div>
        <p class="eyebrow">病房購物流程數位化</p>
        <h1>精神科病人購物清單管理</h1>
        <p class="hero-copy">
          讓護理師在購物日前，直接完成病人點選、零用金檢核、品項彙整與列印總表，不再依靠手抄與記憶分發。
        </p>
      </div>
      <div class="hero-stats">
        <article>
          <span id="stat-patients">0</span>
          <p>今日登記病人</p>
        </article>
        <article>
          <span id="stat-orders">0</span>
          <p>已選購品項</p>
        </article>
        <article>
          <span id="stat-total">NT$0</span>
          <p>本次購物總額</p>
        </article>
      </div>
    </section>

    <section class="panel-grid">
      <section class="panel control-panel">
        <div class="panel-heading">
          <div>
            <p class="panel-kicker">Step 1</p>
            <h2>設定本次購物</h2>
          </div>
        </div>

        <form id="session-form" class="stack-form">
          <label>
            <span>購物日期</span>
            <input type="date" id="shopping-date" required />
          </label>
          <label>
            <span>單人購物上限</span>
            <div class="input-prefix">
              <strong>NT$</strong>
              <input type="number" id="budget-limit" min="0" step="1" value="100" required />
            </div>
          </label>
          <label>
            <span>備註</span>
            <textarea id="session-note" rows="2" placeholder="例如：周一固定購物、家屬已加值零用金"></textarea>
          </label>
        </form>

        <div class="panel-heading sub-heading">
          <div>
            <p class="panel-kicker">Step 2</p>
            <h2>新增病人</h2>
          </div>
        </div>

        <form id="patient-form" class="stack-form">
          <label>
            <span>床號</span>
            <input type="text" id="patient-bed" maxlength="10" placeholder="例如：15" required />
          </label>
          <label>
            <span>病人姓名</span>
            <input type="text" id="patient-name" maxlength="30" placeholder="例如：王OO" required />
          </label>
          <label>
            <span>目前零用金</span>
            <div class="input-prefix">
              <strong>NT$</strong>
              <input type="number" id="patient-balance" min="0" step="1" value="100" required />
            </div>
          </label>
          <button type="submit" class="primary-button">加入今日購物名單</button>
        </form>
      </section>

      <section class="panel patient-panel">
        <div class="panel-heading">
          <div>
            <p class="panel-kicker">Step 3</p>
            <h2>病人購物清單</h2>
          </div>
          <select id="patient-selector" aria-label="選擇病人"></select>
        </div>

        <div id="patient-overview" class="patient-overview empty-state">
          請先新增病人。
        </div>

        <div class="shopping-layout">
          <div>
            <div id="category-nav" class="category-nav"></div>
            <div id="subcategory-nav" class="subcategory-nav"></div>
            <div class="catalog-toolbar">
              <h3>商品價目表</h3>
              <input type="search" id="product-search" placeholder="搜尋飲料、餅乾、電話卡..." />
            </div>
            <form id="custom-item-form" class="inline-form" aria-label="新增自訂品項">
              <input type="text" id="custom-item-name" maxlength="40" placeholder="自訂品項名稱（例如：洗髮精）" required />
              <input type="number" id="custom-item-price" min="1" step="1" placeholder="單價" required />
              <button type="submit" class="secondary-button">加入自訂品項</button>
            </form>
            <div id="catalog-groups" class="catalog-groups"></div>
          </div>

          <aside class="cart-panel">
            <h3>已選購品項</h3>
            <div id="cart-items" class="cart-items empty-state">尚未加入任何商品。</div>
          </aside>
        </div>
      </section>
    </section>

    <section class="panel report-panel">
      <div class="panel-heading">
        <div>
          <p class="panel-kicker">Step 4</p>
          <h2>列印與採買總表</h2>
        </div>
        <div class="report-actions">
          <button type="button" id="export-csv" class="secondary-button">匯出 CSV</button>
          <button type="button" id="print-report" class="secondary-button">列印總表</button>
        </div>
      </div>

      <div class="report-grid">
        <section>
          <h3>今日採買統計</h3>
          <div id="aggregate-summary" class="summary-list empty-state">尚未建立購物資料。</div>
        </section>
        <section>
          <h3>病人分發清單</h3>
          <div id="distribution-list" class="summary-list empty-state">尚未建立購物資料。</div>
        </section>
      </div>
    </section>
  </main>

  <template id="product-card-template">
    <button type="button" class="product-card">
      <span class="product-name"></span>
      <span class="product-price"></span>
    </button>
  </template>

  <script src="./config.js?v=20260501b"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js?v=20260501b"></script>
</body>
</html>
